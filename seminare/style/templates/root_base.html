<!doctype html>
{% load version %}
{% load static %}
<html lang="sk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:ital,wght@0,200..900;1,200..900&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="{% static 'app.min.css' %}?v={% version %}">
  <link rel="stylesheet" href="{% static 'code.css' %}?v={% version %}">

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.15/dist/katex.min.css" integrity="sha384-Htz9HMhiwV8GuQ28Xr9pEs1B4qJiYu/nYLLwlDklR53QibDfmQzi7rYxXhMH/5/u" crossorigin="anonymous">
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.15/dist/katex.min.js" integrity="sha384-bxmi2jLGCvnsEqMuYLKE/KsVCxV3PqmKeK6Y6+lmNXBry6+luFkEOsmp5vD9I/7+" crossorigin="anonymous"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.15/dist/contrib/auto-render.min.js" integrity="sha384-hCXGrW6PitJEwbkoStFjeJxv+fSOOQKOPbJxSfM6G5sWZjAyWhXiTIIAmQqnlLlh" crossorigin="anonymous"></script>

  <script defer data-domain="{{ request.get_host|cut:"www." }}" event-user-authenticated="{{ request.user.is_authenticated|lower }}" event-user-staff="{{ request.user.is_staff|lower }}" src="https://analytics.trojsten.sk/js/script.pageview-props.js"></script>

  <script>
    function formatNum(n) {
      const sciMatch = String(n).trim().match(/^([+-]?(?:\d+(?:\.\d+)?|\.\d+))[eE]([+-]?\d+)$/);
      if (sciMatch) {
        let mantissa = sciMatch[1];
        let exponent = sciMatch[2];

        if (mantissa.endsWith(".")) {
          mantissa = mantissa.slice(0, -1);
        }
        if (mantissa.startsWith("+")) {
          mantissa = mantissa.slice(1);
        }
        if (mantissa === "1") {
          return `10^{${formatNum(exponent)}}`;
        }
        if (mantissa === "-1") {
          return `-10^{${formatNum(exponent)}}`;
        }

        return `${formatNum(mantissa)} \\cdot 10^{${formatNum(exponent)}}`;
      }

      const num = Number(n);
      if (!Number.isNaN(num)) {
        return num.toLocaleString("sk-SK");
      }
      return n;
    }
    function getArgString(context, arg) {
      if (!arg) return "";
      return context.expandTokens(arg)
        .map(t => t.text)
        .join("");
    }
    document.addEventListener("DOMContentLoaded", function() {
      var macros = {
        "\\num": (context) => {
          const arg = context.consumeArgs(1)[0];
          const raw = getArgString(context, arg);
          const formatted = formatNum(raw);
          return `\\mathrm{${formatted}}`;
        },
        "\\SI": (context) => {
          const args = context.consumeArgs(2);
          const numArg = getArgString(context, args[0]);
          const unitArg = getArgString(context, args[1]);
          const formatted = formatNum(numArg);
          return `\\mathrm{${formatted}}\\;\\mathrm{${unitArg}}`;
        },
        "\\si": (context) => {
          const arg = context.consumeArgs(1)[0];
          const unitArg = getArgString(context, arg);
          return `\\mathrm{${unitArg}}`;
        },
        "\\squared": "{^{2}}",
        "\\cubed": "{^{3}}",
        "\\per": "/",
        "\\tera": "T",
        "\\giga": "G",
        "\\mega": "M",
        "\\kilo": "k",
        "\\milli": "m",
        "\\micro": "μ",
        "\\nano": "n",
        "\\kilogram": "\\text{kg}\\,",
        "\\gram": "\\text{g}\\,",
        "\\meter": "\\text{m}\\,",
        "\\metre": "\\text{m}\\,",
        "\\second": "\\text{s}\\,",
        "\\hour": "\\text{h}\\,",
        "\\ampere": "\\text{A}\\,",
        "\\celsius": "^\\circ\\text{C}\\,",
        "\\kelvin": "\\text{K}\\,",
        "\\mol": "\\text{mol}\\,",
        "\\candela": "\\text{cd}\\,",
        "\\newton": "\\text{N}\\,",
        "\\hertz": "\\text{Hz}\\,",
        "\\pascal": "\\text{Pa}\\,",
        "\\volt": "\\text{V}\\,",
        "\\watt": "\\text{W}\\,",
        "\\joule": "\\text{J}\\,",
        "\\henry": "\\text{H}\\,",
        "\\farad": "\\text{F}\\,",
        "\\coulomb": "\\text{C}\\,",
        "\\ohm": "\\Omega\\,",
        "\\weber": "\\text{Wb}\\,",
        "\\tesla": "\\text{T}\\,",
        "\\degree": "\\text{deg}\\,",
        "\\radian": "\\text{rad}\\,",
        "\\steradian": "\\text{sr}\\,",
        "\\lumen": "\\text{lm}\\,",
        "\\lux": "\\text{lx}\\,",
      };

      renderMathInElement(document.body, {
        delimiters: [
            {left: '$$', right: '$$', display: true},
            {left: '$', right: '$', display: false},
            {left: '\\(', right: '\\)', display: false},
            {left: '\\[', right: '\\]', display: true}
        ],
        macros: macros,
        throwOnError: false
      });
    });
  </script>

  <script src="{% static 'app.min.js' %}" defer></script>

  <title>{% block title %}| {{ contest.name }}{% endblock %}</title>
  {% block head %}
  {% endblock %}
</head>
<body class="{% block root_body_class %}{{ contest.theme_name }}{% endblock %}" hx-headers='{"X-CSRFToken": "{{ csrf_token }}"}'>
  {% block root_body %}{% endblock %}
</body>
</html>
